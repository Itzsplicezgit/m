<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:white;
}

.enable-screen{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.enable-btn{
  border:none;
  background:black;
  color:white;
  padding:18px 28px;
  border-radius:18px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.reels-page{
  width:100%;
  height:100vh;
  display:none;
  align-items:center;
  justify-content:center;
  background:white;
  padding:24px;
}

.reels-wrapper{
  position:relative;
  display:flex;
  align-items:flex-end;
}

.reel-card{
  width:min(92vw,430px);
  height:min(92vh,820px);
  border-radius:28px;
  overflow:hidden;
  position:relative;
  background:black;
  box-shadow:0 12px 40px rgba(0,0,0,.18);
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:black;
  display:block;
}

.top-bar{
  position:absolute;
  top:16px;
  left:16px;
  right:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.reels-title{
  color:white;
  font-size:20px;
  font-weight:bold;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.reload-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  color:white;
  font-size:18px;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

.send-btn{
  width:60px;
  height:60px;
  margin-left:18px;
  margin-bottom:10px;
  border:none;
  border-radius:50%;
  background:white;
  color:black;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  flex-shrink:0;
  transition:.2s;
}

.send-btn:hover{
  transform:scale(1.08);
}

.loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  color:white;
  font-size:18px;
  z-index:20;
}
</style>
</head>

<body>

<div class="enable-screen" id="enableScreen">

  <button
    class="enable-btn"
    onclick="enableAudio()"
  >
    Click to enable audio
  </button>

</div>

<div class="reels-page" id="reelsPage">

  <div class="reels-wrapper">

    <div class="reel-card">

      <div class="loading" id="loading">
        Loading...
      </div>

      <div class="top-bar">

        <div class="reels-title">
          Reels
        </div>

        <button
          class="reload-btn"
          onclick="nextVideo()"
        >
          ↻
        </button>

      </div>

      <video
        id="reelVideo"
        autoplay
        playsinline
        loop
      ></video>

    </div>

    <button
      class="send-btn"
      onclick="sendVideo()"
    >
      ➤
    </button>

  </div>

</div>

<script>
const video=document.getElementById("reelVideo");

const loading=document.getElementById("loading");

const enableScreen=document.getElementById("enableScreen");

const reelsPage=document.getElementById("reelsPage");

let currentVideo="";

function enableAudio(){

  enableScreen.style.display="none";

  reelsPage.style.display="flex";

  video.muted=false;

  nextVideo();
}

function randomVideo(){

  const number=
    Math.floor(Math.random()*280)+1;

  return "/videos/" + number + ".mp4";
}

function nextVideo(){

  loading.style.display="flex";

  const random=randomVideo();

  currentVideo=random;

  video.src=random;

  video.onloadeddata=async()=>{

    loading.style.display="none";

    try{
      await video.play();
    }catch(e){}
  };

  video.onerror=()=>{
    nextVideo();
  };
}

function sendVideo(){

  if(!currentVideo) return;

  window.parent.postMessage({
    type:"sendReel",
    url:currentVideo
  },"*");
}

video.addEventListener("click",()=>{

  if(video.paused){
    video.play();
  }else{
    video.pause();
  }
});
</script>

</body>
</html>
