<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  overflow: hidden;
}

.screen {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  width: 320px;
  background: white;
  padding: 20px;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
  height: 42px;
  border-radius: 10px;
  border: 1px solid #ddd;
  padding: 0 10px;
  outline: none;
}

button {
  height: 42px;
  border: none;
  border-radius: 10px;
  background: #0095f6;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.switch {
  font-size: 12px;
  color: #555;
  text-align: center;
  cursor: pointer;
}

.hidden {
  display: none;
}

.preview {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto;
}
</style>
</head>

<body>

<div id="auth" class="screen">

  <div class="card" id="loginCard">
    <h3>Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="toggle()">Create account</div>
  </div>

  <div class="card hidden" id="signupCard">
    <h3>Sign Up</h3>

    <input id="signupUser" placeholder="Username">
    <input id="signupPass" type="password" placeholder="Password">

    <input type="file" id="pfpInput" accept="image/*">
    <img id="preview" class="preview hidden">

    <button id="signupBtn" onclick="signup()" disabled>Create Account</button>

    <div class="switch" onclick="toggle()">Back to login</div>
  </div>

</div>

<script>
function toggle() {
  document.getElementById('loginCard').classList.toggle('hidden');
  document.getElementById('signupCard').classList.toggle('hidden');
}

let profilePic = "";

document.getElementById('pfpInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    profilePic = event.target.result;

    const img = document.getElementById('preview');
    img.src = profilePic;
    img.classList.remove('hidden');

    document.getElementById('signupBtn').disabled = false;
  };

  reader.readAsDataURL(file);
});

function signup() {
  const user = document.getElementById('signupUser').value.trim();
  const pass = document.getElementById('signupPass').value.trim();

  if (!user || !pass) {
    alert("Fill all fields");
    return;
  }

  if (!profilePic) {
    alert("Profile picture is required");
    return;
  }

  localStorage.setItem("chatUser", JSON.stringify({
    user,
    pass,
    profilePic
  }));

  goToApp(user);
}

function login() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();

  const saved = JSON.parse(localStorage.getItem("chatUser"));

  if (!saved || saved.user !== user || saved.pass !== pass) {
    alert("Invalid login");
    return;
  }

  goToApp(saved.user);
}

function goToApp(user) {
  window.location.href = "main.html?user=" + encodeURIComponent(user);
}
</script>

</body>
</html>
